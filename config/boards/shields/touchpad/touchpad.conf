# Azoteq IQS5xx touchpad driver
CONFIG_INPUT=y
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_INPUT_AZOTEQ_IQS5XX=y

# ZMK mouse/pointing support
CONFIG_ZMK_MOUSE=y

# BLE
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_CTLR=y

# USB (optional – to also use via USB-C)
CONFIG_ZMK_USB=y

# Power (lower power consumption for LiPo operation)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Logging (uncomment for debugging)
# CONFIG_LOG=y
# CONFIG_ZMK_LOG_LEVEL_DBG=y
# CONFIG_INPUT_LOG_LEVEL_DBG=y
# CONFIG_I2C_LOG_LEVEL_DBG=y
